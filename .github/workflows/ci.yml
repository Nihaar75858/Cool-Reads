name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Frontend Dependencies
      run: |
        cd frontend 
        npm install --legacy-peer-deps

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install --legacy-peer-deps

    - name: Check frontend node_modules
      run: |
        ls -la frontend/node_modules/.bin | grep react-scripts

    - name: Build Frontend
      run: |
        cd frontend 
        CI=false npm run build

      
